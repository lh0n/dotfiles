---
- name: Install PIPX Packages Common to ALL Hosts
  hosts: all
  gather_facts: false
  tasks:
    - name: Install Common PIPX Packages
      community.general.pipx:
        name: "{{ item }}"
        state: latest
      loop:
        - ipython
      tags:
        - packages
        - user
        - python
        - pipx

- name: Controller PIPX Packages
  hosts: controller
  gather_facts: false
  tasks:
    - name: Install Controller PIPX Packages
      community.general.pipx:
        name: "{{ item }}"
        state: latest
      loop:
        - ansible-lint
        - black
      tags:
        - packages
        - user
        - python
        - pipx
