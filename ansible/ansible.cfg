[defaults]
nocows = True
inventory = ~/ansible/inventory/home.yaml
roles_path = ./roles
stdout_callback = ansible.builtin.default
result_format = yaml
host_key_checking = False

# Opt into future default: facts only accessible via ansible_facts['x'], not ansible_x
INJECT_FACTS_AS_VARS = False

# Suppress undiscovered-interpreter warnings on remote hosts
interpreter_python = auto_silent

[ssh_connection]
ssh_args = -C -o ControlMaster=auto -o ControlPersist=20h
